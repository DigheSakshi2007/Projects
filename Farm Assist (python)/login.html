<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farm Assist - Login</title>
<style>
/* Body with farm / vegetables theme background */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1582515073490-399813f43f07?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w5MjUyMHwwfDF8c2VhfHx2ZWdldGFibGV8fHx8fHwxNjc5NTUwMjI4&ixlib=rb-4.0.3&q=80&w=1080') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Form container */
.form-container {
    background: rgba(255, 255, 255, 0.9);
    padding: 35px 40px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Logo / title */
.logo {
    font-size: 32px;
    margin-bottom: 10px;
}

.logo span {
    color: #4caf50;
    font-weight: bold;
}

/* Heading */
h2 {
    color: #388e3c;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #4caf50;
    box-shadow: 0 0 6px #4caf50;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #4caf50, #81c784);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(45deg, #388e3c, #2e7d32);
    transform: scale(1.03);
}

/* Register link */
.register-link {
    margin-top: 15px;
    display: block;
    color: #4caf50;
    text-decoration: none;
    font-weight: bold;
}

.register-link:hover {
    text-decoration: underline;
}

/* Small footer */
.footer-text {
    margin-top: 12px;
    font-size: 13px;
    color: #555;
}
</style>
</head>
<body>

<div class="form-container">
    <div class="logo">🍅🌽 Farm Assist</div>
    <h2>Login</h2>

    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a class="register-link" href="/register">New user? Register here</a>

    <div class="footer-text">
        Grow smart, eat fresh! 🌱
    </div>
</div>

</body>
</html>
