<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Results</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f9fff9;
    margin:0; padding:0;
    text-align: center;
}
h2 {
    color: #2e8b57;
    margin-top: 20px;
}
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
}
.card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    margin: 15px;
    width: 220px;
    transition: transform 0.3s, box-shadow 0.3s;
    text-align: center;
    padding-bottom: 15px;
}
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}
.card img {
    width: 180px;
    height: 140px;
    border-radius: 10px 10px 0 0;
}
.card h3 {
    color: #2e8b57;
}
.card a {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 15px;
    background: #2e8b57;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}
.card a:hover {
    background: #276747;
}
</style>
</head>
<body>
<h2><i class="fas fa-seedling"></i> Search Results</h2>
<div class="cards">
{% for plant in plants %}
<div class="card">
    <img src="{{ url_for('static', filename='images/' + plant[3]) }}" alt="{{ plant[1] }}">
    <h3>{{ plant[1] }}</h3>
    <a href="/plant/{{ plant[0] }}"><i class="fas fa-info-circle"></i> Details</a>
</div>
{% endfor %}
</div>
</body>
</html>
