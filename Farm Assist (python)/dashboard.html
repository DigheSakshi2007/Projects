<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f8ff;
    margin:0;
    padding:0;
}
header {
    background: #2e8b57;
    color: white;
    padding: 20px;
    text-align: center;
}
.container {
    max-width: 800px;
    margin: 50px auto;
    text-align: center;
}
input[type="text"], select {
    padding: 12px;
    width: 60%;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
}
button {
    padding: 12px 25px;
    border: none;
    background: #2e8b57;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #276747;
}
</style>
</head>
<body>
<header>
    <h1><i class="fas fa-leaf"></i> Plant Search Dashboard</h1>
</header>
<div class="container">
    <form action="/search" method="POST">
        <input type="text" name="search" placeholder="Search by plant name...">
        <br>
        <select name="category">
            <option value="vegetable">🥕 Vegetables</option>
            <option value="fruit">🍎 Fruits</option>
        </select>
        <br>
        <button type="submit"><i class="fas fa-search"></i> Search</button>
    </form>
</div>
</body>
</html>
